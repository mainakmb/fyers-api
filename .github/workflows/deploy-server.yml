name: Deploy Server

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

env:
  TF_STATE_REPO: mainakmb/tfstate-storage
  TF_STATE_PROJECT: fyers-api
  TF_WORKING_DIR: terraform

jobs:
  terraform:
    name: Provision DigitalOcean Droplet
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Code Repo
        uses: actions/checkout@v4

      - name: Validate State Repo PAT
        env:
          STATE_REPO_PAT: ${{ secrets.STATE_REPO_PAT }}
        run: |
          if [ -z "${STATE_REPO_PAT}" ]; then
            echo "::error::STATE_REPO_PAT is empty. Add it under Settings → Environments → production → Environment secrets."
            exit 1
          fi

          http_code="$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${STATE_REPO_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ env.TF_STATE_REPO }}")"

          if [ "${http_code}" != "200" ]; then
            echo "::error::STATE_REPO_PAT cannot access ${{ env.TF_STATE_REPO }} (HTTP ${http_code})."
            echo "::error::Use a classic PAT with the 'repo' scope, or a fine-grained PAT with Contents Read/Write on mainakmb/tfstate-storage."
            exit 1
          fi

      - name: Checkout Isolated State Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TF_STATE_REPO }}
          token: ${{ secrets.STATE_REPO_PAT }}
          path: remote-state-dir

      - name: Inject Remote State into Workspace
        run: |
          STATE_DIR="remote-state-dir/${{ env.TF_STATE_PROJECT }}"
          STATE_FILE="${STATE_DIR}/terraform.tfstate"
          LOCAL_STATE="${{ env.TF_WORKING_DIR }}/terraform.tfstate"

          mkdir -p "${STATE_DIR}"
          if [ -f "${STATE_FILE}" ]; then
            cp "${STATE_FILE}" "${LOCAL_STATE}"
            echo "Restored state from ${{ env.TF_STATE_REPO }}/${{ env.TF_STATE_PROJECT }}/terraform.tfstate"
          else
            echo "No existing state for ${{ env.TF_STATE_PROJECT }}; starting fresh."
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Prepare SSH Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: bash .github/scripts/prepare-ssh-key.sh

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_TOKEN }}
        run: terraform init

      - name: Terraform Apply
        id: terraform_apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_TOKEN }}
        run: |
          terraform apply -auto-approve \
            -var="pvt_key_path=${HOME}/.ssh/id_rsa"

      - name: Show Outputs
        id: infra
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "server_ip=$(terraform output -raw server_static_ip)" >> "$GITHUB_OUTPUT"
          terraform output

      - name: Wait for SSH and Cloud-Init
        env:
          SERVER_IP: ${{ steps.infra.outputs.server_ip }}
        run: |
          echo "Waiting for ${SERVER_IP} to accept SSH..."
          for attempt in $(seq 1 36); do
            if ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=10 -i ~/.ssh/id_rsa \
              "root@${SERVER_IP}" "cloud-init status --wait >/dev/null 2>&1 || test -d /root"; then
              echo "SSH ready on attempt ${attempt}"
              exit 0
            fi
            echo "Attempt ${attempt}/36 — retrying in 10s..."
            sleep 10
          done
          echo "Timed out waiting for SSH on ${SERVER_IP}"
          exit 1

      - name: Stage Updated State for Sync
        if: steps.terraform_apply.outcome == 'success'
        run: |
          STATE_DIR="remote-state-dir/${{ env.TF_STATE_PROJECT }}"
          LOCAL_STATE="${{ env.TF_WORKING_DIR }}/terraform.tfstate"
          STATE_FILE="${STATE_DIR}/terraform.tfstate"

          mkdir -p "${STATE_DIR}"
          if [ -f "${LOCAL_STATE}" ]; then
            cp "${LOCAL_STATE}" "${STATE_FILE}"
          fi

      - name: Push State Back to Storage Repository
        if: steps.terraform_apply.outcome == 'success'
        env:
          STATE_REPO_PAT: ${{ secrets.STATE_REPO_PAT }}
        run: |
          if [ ! -d remote-state-dir/.git ]; then
            echo "::error::State repo checkout did not create a git workspace."
            exit 1
          fi

          cd remote-state-dir
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${STATE_REPO_PAT}@github.com/${{ env.TF_STATE_REPO }}.git"

          git add "${{ env.TF_STATE_PROJECT }}/terraform.tfstate"
          if git diff --cached --quiet; then
            echo "State unchanged; skipping commit."
          else
            git commit -m "sync(${{ env.TF_STATE_PROJECT }}): run ${{ github.run_id }}"
            git push origin main
          fi
