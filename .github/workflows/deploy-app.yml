name: Deploy App

on:
  push:
    branches:
      - main
    paths:
      - "*.py"
      - "requirements.txt"
      - ".env.buy.example"
      - ".env.sell.example"
      - ".github/workflows/deploy-app.yml"
  workflow_dispatch:
    inputs:
      buy_index_symbol:
        description: "Buy — INDEX_SYMBOL"
        type: string
        default: "NSE:NIFTY50-INDEX"
      buy_options_symbol:
        description: "Buy — OPTIONS_SYMBOL"
        type: string
        default: "BSE:SENSEX2670277100PE"
      buy_index_entry:
        description: "Buy — INDEX_ENTRY"
        type: string
        default: "24100.0"
      buy_order_lots:
        description: "Buy — ORDER_LOTS"
        type: string
        default: "1"
      buy_product_type:
        description: "Buy — PRODUCT_TYPE (INTRADAY or MARGIN)"
        type: choice
        options:
          - INTRADAY
          - MARGIN
        default: INTRADAY
      buy_entry_delay_seconds:
        description: "Buy — ENTRY_DELAY_SECONDS"
        type: string
        default: "0"
      sell_index_symbol:
        description: "Sell — INDEX_SYMBOL"
        type: string
        default: "NSE:NIFTY50-INDEX"
      sell_options_symbol:
        description: "Sell — OPTIONS_SYMBOL"
        type: string
        default: "BSE:SENSEX2670277100PE"
      sell_index_stop_loss:
        description: "Sell — INDEX_STOP_LOSS"
        type: string
        default: "24150.0"
      sell_index_target:
        description: "Sell — INDEX_TARGET"
        type: string
        default: "24036.0"
      sell_product_type:
        description: "Sell — PRODUCT_TYPE (INTRADAY or MARGIN)"
        type: choice
        options:
          - INTRADAY
          - MARGIN
        default: INTRADAY
      sell_exit_delay_seconds:
        description: "Sell — EXIT_DELAY_SECONDS"
        type: string
        default: "1"
  repository_dispatch:
    types:
      - refresh-trading-token

env:
  TF_STATE_REPO: mainakmb/tfstate-storage
  TF_STATE_PROJECT: fyers-api
  TF_WORKING_DIR: terraform
  REMOTE_APP_DIR: /root/trading-bot
  TMUX_SESSION: trading_session

jobs:
  deploy:
    name: Deploy Codebase to Droplet
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Code Repo
        uses: actions/checkout@v4

      - name: Prepare Strategy Config
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            printf '%s\n' \
              "INDEX_SYMBOL=${{ inputs.buy_index_symbol }}" \
              "OPTIONS_SYMBOL=${{ inputs.buy_options_symbol }}" \
              "INDEX_ENTRY=${{ inputs.buy_index_entry }}" \
              "ORDER_LOTS=${{ inputs.buy_order_lots }}" \
              "PRODUCT_TYPE=${{ inputs.buy_product_type }}" \
              "ENTRY_DELAY_SECONDS=${{ inputs.buy_entry_delay_seconds }}" \
              > .env.buy

            printf '%s\n' \
              "INDEX_SYMBOL=${{ inputs.sell_index_symbol }}" \
              "OPTIONS_SYMBOL=${{ inputs.sell_options_symbol }}" \
              "INDEX_STOP_LOSS=${{ inputs.sell_index_stop_loss }}" \
              "INDEX_TARGET=${{ inputs.sell_index_target }}" \
              "PRODUCT_TYPE=${{ inputs.sell_product_type }}" \
              "EXIT_DELAY_SECONDS=${{ inputs.sell_exit_delay_seconds }}" \
              > .env.sell

            echo "Using workflow_dispatch strategy inputs:"
          else
            cp .env.buy.example .env.buy
            cp .env.sell.example .env.sell
            echo "Using strategy from .env.buy.example and .env.sell.example:"
          fi

          echo "--- .env.buy ---"
          cat .env.buy
          echo "--- .env.sell ---"
          cat .env.sell

      - name: Validate State Repo PAT
        env:
          STATE_REPO_PAT: ${{ secrets.STATE_REPO_PAT }}
        run: |
          if [ -z "${STATE_REPO_PAT}" ]; then
            echo "::error::STATE_REPO_PAT is empty. Add it under Settings → Environments → production → Environment secrets."
            exit 1
          fi

          http_code="$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${STATE_REPO_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ env.TF_STATE_REPO }}")"

          if [ "${http_code}" != "200" ]; then
            echo "::error::STATE_REPO_PAT cannot access ${{ env.TF_STATE_REPO }} (HTTP ${http_code})."
            echo "::error::Use a classic PAT with the 'repo' scope, or a fine-grained PAT with Contents Read/Write on mainakmb/tfstate-storage."
            exit 1
          fi

      - name: Validate FYERS Secrets
        env:
          FYERS_ACCESS_TOKEN: ${{ secrets.FYERS_ACCESS_TOKEN }}
          FYERS_APP_ID: ${{ secrets.FYERS_APP_ID }}
          FYERS_SECRET_KEY: ${{ secrets.FYERS_SECRET_KEY }}
        run: |
          missing=0
          for name in FYERS_ACCESS_TOKEN FYERS_APP_ID FYERS_SECRET_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is empty. Add it under Settings → Environments → production → Environment secrets."
              missing=1
            fi
          done
          exit "${missing}"

      - name: Checkout Isolated State Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TF_STATE_REPO }}
          token: ${{ secrets.STATE_REPO_PAT }}
          path: remote-state-dir

      - name: Resolve Server IP from Remote State
        id: infra
        run: |
          STATE_FILE="remote-state-dir/${{ env.TF_STATE_PROJECT }}/terraform.tfstate"
          LOCAL_STATE="${{ env.TF_WORKING_DIR }}/terraform.tfstate"

          if [ ! -f "${STATE_FILE}" ]; then
            echo "No remote state found at ${STATE_FILE}" >&2
            echo "Run the Deploy Server workflow first." >&2
            exit 1
          fi

          mkdir -p "${{ env.TF_WORKING_DIR }}"
          cp "${STATE_FILE}" "${LOCAL_STATE}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Read Server IP
        id: server
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false
          echo "server_ip=$(terraform output -raw server_static_ip)" >> "$GITHUB_OUTPUT"
          echo "Deploying to $(terraform output -raw server_static_ip)"

      - name: Prepare SSH Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: bash .github/scripts/prepare-ssh-key.sh

      - name: Sync Application Code to Droplet
        env:
          SERVER_IP: ${{ steps.server.outputs.server_ip }}
        run: |
          APP_DIR="${{ env.REMOTE_APP_DIR }}"
          SSH_OPTS=(-o BatchMode=yes -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_rsa)

          ssh "${SSH_OPTS[@]}" "root@${SERVER_IP}" "mkdir -p '${APP_DIR}/logs'"

          scp "${SSH_OPTS[@]}" \
            buy.py sell.py main.py execution_log.py test-api.py requirements.txt \
            ".env.buy" ".env.sell" \
            "root@${SERVER_IP}:${APP_DIR}/"

      - name: Configure Secrets and Start Trading Session
        env:
          SERVER_IP: ${{ steps.server.outputs.server_ip }}
          FYERS_ACCESS_TOKEN: ${{ secrets.FYERS_ACCESS_TOKEN }}
          FYERS_APP_ID: ${{ secrets.FYERS_APP_ID }}
          FYERS_SECRET_KEY: ${{ secrets.FYERS_SECRET_KEY }}
          APP_DIR: ${{ env.REMOTE_APP_DIR }}
          TMUX_SESSION: ${{ env.TMUX_SESSION }}
        run: |
          SSH_OPTS=(-o BatchMode=yes -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_rsa)

          ssh "${SSH_OPTS[@]}" "root@${SERVER_IP}" env \
            "FYERS_ACCESS_TOKEN=${FYERS_ACCESS_TOKEN}" \
            "FYERS_APP_ID=${FYERS_APP_ID}" \
            "FYERS_SECRET_KEY=${FYERS_SECRET_KEY}" \
            "APP_DIR=${APP_DIR}" \
            "TMUX_SESSION=${TMUX_SESSION}" \
            bash -s <<'REMOTE'
          set -euo pipefail
          cd "${APP_DIR}"

          umask 077
          printf '%s\n' \
            "FYERS_ACCESS_TOKEN=${FYERS_ACCESS_TOKEN}" \
            "FYERS_APP_ID=${FYERS_APP_ID}" \
            "FYERS_SECRET_KEY=${FYERS_SECRET_KEY}" \
            > .env
          chmod 600 .env

          if [ ! -d .venv ]; then
            python3 -m venv .venv
          fi
          # shellcheck disable=SC1091
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

          echo "Running FYERS API connectivity test..."
          if ! python3 test-api.py; then
            echo "::error::FYERS API test failed. Token may be expired or secrets misconfigured."
            tail -n 30 logs/fyersApi.log 2>/dev/null || true
            exit 1
          fi

          tmux kill-session -t "${TMUX_SESSION}" 2>/dev/null || true
          tmux new-session -d -s "${TMUX_SESSION}" \
            "cd '${APP_DIR}' && source .venv/bin/activate && python3 main.py >> logs/runner.log 2>&1"

          sleep 3
          tmux list-sessions || true
          if ! tmux has-session -t "${TMUX_SESSION}"; then
            echo "::error::tmux session exited immediately. Recent logs:"
            tail -n 50 logs/runner.log 2>/dev/null || true
            exit 1
          fi
          REMOTE

      - name: Verify Remote Process
        env:
          SERVER_IP: ${{ steps.server.outputs.server_ip }}
        run: |
          SESSION="${{ env.TMUX_SESSION }}"
          ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_rsa \
            "root@${SERVER_IP}" bash -s <<REMOTE
          set -euo pipefail
          if tmux has-session -t '${SESSION}'; then
            echo "tmux session '${SESSION}' is running"
            tmux list-sessions
            exit 0
          fi
          echo "::error::tmux session '${SESSION}' not found"
          tail -n 80 /root/trading-bot/logs/runner.log 2>/dev/null || true
          exit 1
          REMOTE
