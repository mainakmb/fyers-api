name: FYERS Trading Workflow

on:
  workflow_dispatch:
    inputs:
      index_symbol:
        description: 'Index symbol to monitor'
        required: true
        default: 'BSE:SENSEX-INDEX'
      options_symbol:
        description: 'Option symbol to manage'
        required: true
        default: 'BSE:SENSEX2670276900PE'
      index_stop_loss:
        description: 'Stop loss level for the index'
        required: true
        default: '77200.0'
      index_target:
        description: 'Target level for the index'
        required: true
        default: '76480.0'

jobs:
  validate-and-run:
    runs-on: ubuntu-latest
    env:
      INDEX_SYMBOL: ${{ github.event.inputs.index_symbol }}
      OPTIONS_SYMBOL: ${{ github.event.inputs.options_symbol }}
      INDEX_STOP_LOSS: ${{ github.event.inputs.index_stop_loss }}
      INDEX_TARGET: ${{ github.event.inputs.index_target }}
      FYERS_ACCESS_TOKEN: ${{ secrets.FYERS_ACCESS_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install fyers-apiv3

      - name: Run tests
        run: |
          python -m unittest discover -s tests -v

      - name: Run API connectivity test
        run: |
          python test-api.py

      - name: Run trading script
        run: |
          python main.py
